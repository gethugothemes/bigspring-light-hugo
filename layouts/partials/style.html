{{ $mainCSS := resources.Get "css/main.css" }}
{{ $tailwindOpts := dict "inlineImports" true }}
{{ $tailwindCSS := $mainCSS | css.TailwindCSS $tailwindOpts }}
{{ if hugo.IsProduction }}
  {{ $tailwindCSS = $tailwindCSS | minify | fingerprint }}
{{ end }}
<link rel="stylesheet" href="{{ $tailwindCSS.RelPermalink }}"{{ if hugo.IsProduction }} integrity="{{ $tailwindCSS.Data.Integrity }}"{{ end }}>
