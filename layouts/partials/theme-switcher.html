<!-- theme switcher -->
{{ if site.Params.theme_switcher }}
<div class="theme-switcher invisible ml-2">
  <input id="theme-switcher" data-theme-switcher type="checkbox" />
  <label for="theme-switcher" class="cursor-pointer relative inline-block">
    <span class="sr-only">Toggle dark mode</span>
    <span class="relative inline-flex items-center justify-center w-8 h-8">
      <!-- sun icon -->
      <svg class="absolute opacity-100 dark:opacity-0 transition-opacity" viewBox="0 0 24 24" fill="currentColor" height="18" width="18">
        <path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2a7 7 0 1 1 0-14 7 7 0 0 1 0 14zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.515 4.929l1.414-1.414L7.05 5.636 5.636 7.05 3.515 4.93zM16.95 18.364l1.414-1.414 2.121 2.121-1.414 1.414-2.121-2.121zm2.121-14.85l1.414 1.415-2.121 2.121-1.414-1.414 2.121-2.121zM5.636 16.95l1.414 1.414-2.121 2.121-1.414-1.414 2.121-2.121zM23 11v2h-3v-2h3zM1 11v2H-2v-2h3z"/>
      </svg>
      <!-- moon icon -->
      <svg class="absolute opacity-0 dark:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="currentColor" height="18" width="18">
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </span>
  </label>
</div>

<script>
  (function() {
    var darkMode = localStorage.getItem("theme") === "dark";

    if (localStorage.getItem("theme") === null) {
      darkMode = {{ if eq site.Params.theme_default "dark" }}true{{ else }}false{{ end }};
      {{ if eq site.Params.theme_default "system" }}
      if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        darkMode = true;
      }
      {{ end }}
    }

    if (darkMode) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }

    document.addEventListener("DOMContentLoaded", function() {
      var switches = document.querySelectorAll("[data-theme-switcher]");
      var containers = document.querySelectorAll(".theme-switcher");

      switches.forEach(function(ts) {
        ts.checked = darkMode;
        ts.addEventListener("click", function() {
          document.documentElement.classList.toggle("dark");
          localStorage.setItem(
            "theme",
            document.documentElement.classList.contains("dark") ? "dark" : "light"
          );
        });
      });

      containers.forEach(function(c) { c.classList.remove("invisible"); });
    });
  })();
</script>
{{ end }}
